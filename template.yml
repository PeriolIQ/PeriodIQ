#         - DynamoDBReadPolicy:
#             TableName: !Ref WorkoutPlanTable
#         - SESCrudPolicy:
#             IdentityName: !Ref SesSenderEmail
#         - SQSPollerPolicy:
#             QueueName: !GetAtt WorkoutProcessingQueue.QueueName
#       Tags:
