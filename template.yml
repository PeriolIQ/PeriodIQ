AWSTemplateFormatVersion: "2010-09-09"

Transform: AWS::Serverless-2016-10-31

Description: >
  PeriodIQ - Workout Periodization Planning Platform
  Day du 16 dich vu AWS: WAF, CloudFront, S3, Cognito, API Gateway,
  Lambda (API/Worker), DynamoDB, SQS, SNS/SES, CloudWatch
  (CodePipeline/CodeBuild/CloudFormation nam o file cicd-pipeline.yml rieng)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - production
    Description: "Moi truong deploy (dev/staging/production)"

  AlertEmail:
    Type: String
    Default: "syvan.claude@outlook.com"
    Description: "Email nhan thong bao CloudWatch Alarm (SNS)"

  SesSenderEmail:
    Type: String
    Default: "noreply@periodiq.example.com"
    Description: "Email gui giao an / nhac lich tap qua SES (phai verify truoc khi dung that)"

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: provided.al2023
    Architectures:
      - x86_64
    Environment:
      Variables:
        ASPNETCORE_ENVIRONMENT: !Ref Environment

Resources:

  # ==========================================================================
  # 1. COGNITO (Nguoi 1) - Xac thuc User & Admin
  # ==========================================================================
  PeriodIQUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "periodiq-users-${Environment}"
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: name
          Required: true
          Mutable: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      MfaConfiguration: "OFF"

  PeriodIQUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "periodiq-spa-client-${Environment}"
      UserPoolId: !Ref PeriodIQUserPool
      GenerateSecret: false   # SPA frontend khong co secret
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      PreventUserExistenceErrors: ENABLED

  AdminsGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Admins
      UserPoolId: !Ref PeriodIQUserPool
      Description: "Nhom Admin - co quyen quan tri he thong"

  UsersGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Users
      UserPoolId: !Ref PeriodIQUserPool
      Description: "Nhom User thuong - nguoi tap gym"

  # ==========================================================================
  # 2. AWS WAF (Nguoi 1) - Chan SQL Injection, XSS, bot, rate limit
  # LUU Y: Scope REGIONAL de tao duoc o ap-southeast-1 (CLOUDFRONT bat buoc us-east-1).
  # REGIONAL WebACL khong gan vao CloudFront duoc -> gan vao Cognito User Pool (xem WebAclAssociation).
  # ==========================================================================
  PeriodIQWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "periodiq-waf-${Environment}"
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "periodiq-waf-${Environment}"
      Rules:
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: CommonRuleSetMetric
        - Name: AWSManagedRulesBotControlRuleSet
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesBotControlRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: BotControlMetric
        - Name: RateLimitRule
          Priority: 3
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 2000   # 2000 requests / 5 phut / IP
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitMetric

  # Gan WAF REGIONAL vao Cognito User Pool (tai nguyen regional o ap-southeast-1)
  PeriodIQWebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !GetAtt PeriodIQUserPool.Arn
      WebACLArn: !GetAtt PeriodIQWebAcl.Arn

  # ==========================================================================
  # 3. CLOUDFRONT (Nguoi 1) - CDN + dinh tuyen /api -> API Gateway
  # ==========================================================================
  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "periodiq-oac-${Environment}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  PeriodIQDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        # WAF chuyen sang REGIONAL gan vao Cognito -> khong gan vao CloudFront nua
        Origins:
          - Id: FrontendS3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref FrontendOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
          - Id: ApiGatewayOrigin
            DomainName: !Sub "${PeriodIQHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6   # Managed-CachingOptimized
        CacheBehaviors:
          - PathPattern: "/api/*"
            TargetOriginId: ApiGatewayOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad   # Managed-CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac   # Managed-AllViewerExceptHostHeader
        CustomErrorResponses:
          # SPA: route khong ton tai van tra ve index.html, de React Router xu ly
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  # ==========================================================================
  # 4. LAMBDA · API HANDLER (Nguoi 2) - gop ca Rule Engine + Admin API
  # (Chien luoc Monolithic Lambda - xem README muc "Cau truc du an")
  # ==========================================================================
  PeriodIQApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "periodiq-api-${Environment}"
      Handler: PeriodIQ.Api
      CodeUri: ./PeriodIQ.Backend/PeriodIQ.Api/
      Description: "PeriodIQ Backend API - Workout Periodization Platform"
      Environment:
        Variables:
          SQS_QUEUE_URL: !Ref WorkoutProcessingQueue
          COGNITO_USER_POOL_ID: !Ref PeriodIQUserPool
          COGNITO_CLIENT_ID: !Ref PeriodIQUserPoolClient
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref PeriodIQHttpApi
            Path: /{proxy+}
            Method: ANY
        HealthCheckEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref PeriodIQHttpApi
            Path: /api/health
            Method: GET
            Auth:
              Authorizer: NONE   # health check phai public, khong qua JWT
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ExerciseTable
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkoutTemplateTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RuleDefinitionTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserProfileTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PersonalRecordHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref DailyCnsStatusTable
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkoutPlanTable
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkoutSessionLogTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt WorkoutProcessingQueue.QueueName
        - CloudWatchLogsFullAccess
      Tags:
        Project: PeriodIQ
        Environment: !Ref Environment
    Metadata:
      BuildMethod: dotnet10
      BuildProperties:
        ProjectSubPath: PeriodIQ.Api/PeriodIQ.Api.csproj

  # ==========================================================================
  # 5. LAMBDA · WORKER (Nguoi 3) - xu ly message tu SQS, gui email qua SES
  # TODO Nguoi 3: tao project PeriodIQ.Worker/ (hoac doi CodeUri sang du an that)
  # ==========================================================================
# TODO Nguoi 3: BO COMMENT khi da tao project PeriodIQ.Worker/
