#       BuildMethod: dotnet10
#       BuildProperties:
#         ProjectSubPath: PeriodIQ.Worker/PeriodIQ.Worker.csproj

  # ==========================================================================
  # 6. API GATEWAY - HTTP API + Cognito JWT Authorizer (Nguoi 4 + Nguoi 1)
  # ==========================================================================
  PeriodIQHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Description: "PeriodIQ API Gateway"
      Auth:
        Authorizers:
          CognitoAuthorizer:
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${PeriodIQUserPool}"
              audience:
                - !Ref PeriodIQUserPoolClient
            IdentitySource: "$request.header.Authorization"
        DefaultAuthorizer: CognitoAuthorizer
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Amz-Date
          - X-Api-Key
        MaxAge: 300

  # ==========================================================================
  # 7. DYNAMODB - 8 bang du lieu (Nguoi 4)
  # ==========================================================================
  ExerciseTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Exercise-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: Id
          AttributeType: S
      KeySchema:
        - AttributeName: Id
          KeyType: HASH

  WorkoutTemplateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "WorkoutTemplate-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: Id
          AttributeType: S
      KeySchema:
        - AttributeName: Id
          KeyType: HASH

  RuleDefinitionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "RuleDefinition-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: Id
          AttributeType: S
      KeySchema:
        - AttributeName: Id
          KeyType: HASH

  UserProfileTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "UserProfile-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: Id
          AttributeType: S
        - AttributeName: Email
          AttributeType: S
      KeySchema:
        - AttributeName: Id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: Email-index
          KeySchema:
            - AttributeName: Email
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  PersonalRecordHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "PersonalRecordHistory-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: Id
          AttributeType: S
        - AttributeName: UserId
          AttributeType: S
        - AttributeName: ExerciseId
          AttributeType: S
      KeySchema:
        - AttributeName: Id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserId-ExerciseId-index
          KeySchema:
            - AttributeName: UserId
              KeyType: HASH
            - AttributeName: ExerciseId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  DailyCnsStatusTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "DailyCnsStatus-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: Id
          AttributeType: S
        - AttributeName: UserId
          AttributeType: S
        - AttributeName: DateLog
          AttributeType: S
      KeySchema:
        - AttributeName: Id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserId-DateLog-index
          KeySchema:
            - AttributeName: UserId
              KeyType: HASH
            - AttributeName: DateLog
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  WorkoutPlanTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "WorkoutPlan-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: Id
          AttributeType: S
        - AttributeName: UserId
          AttributeType: S
        - AttributeName: StartDate
          AttributeType: S
      KeySchema:
        - AttributeName: Id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserId-StartDate-index
          KeySchema:
            - AttributeName: UserId
              KeyType: HASH
            - AttributeName: StartDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  WorkoutSessionLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "WorkoutSessionLog-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: Id
          AttributeType: S
        - AttributeName: UserId
          AttributeType: S
        - AttributeName: CompletedAt
          AttributeType: S
      KeySchema:
        - AttributeName: Id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserId-CompletedAt-index
          KeySchema:
            - AttributeName: UserId
              KeyType: HASH
            - AttributeName: CompletedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ==========================================================================
  # 8. SQS (Nguoi 3) - hang doi xu ly workout (async)
  # ==========================================================================
  WorkoutProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "periodiq-workout-processing-${Environment}"
      VisibilityTimeout: 60
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt WorkoutProcessingDLQ.Arn
        maxReceiveCount: 3

  WorkoutProcessingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "periodiq-workout-processing-dlq-${Environment}"
      MessageRetentionPeriod: 1209600

  # ==========================================================================
  # 9. S3 (Nguoi 2) - hosting frontend, chi cho CloudFront doc qua OAC
  # ==========================================================================
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "periodiq-frontend-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: "s3:GetObject"
            Resource: !Sub "arn:aws:s3:::${FrontendBucket}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${PeriodIQDistribution}"

  # ==========================================================================
  # 10. SNS / SES (Nguoi 3) - alert noi bo (SNS) + email user that (SES)
  # ==========================================================================
  AlertSnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "periodiq-alerts-${Environment}"
      DisplayName: "PeriodIQ Alerts"

  AlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertSnsTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  SesSenderIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: !Ref SesSenderEmail
      # Sau khi tao, phai vao SES Console bam link verify trong email truoc khi gui that

  # ==========================================================================
  # 11. CLOUDWATCH (Nguoi 5) - Log Group, Metric Filter, Alarms
  # ==========================================================================
  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/periodiq-api-${Environment}"
      RetentionInDays: 30

  ApiErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ApiLogGroup
      FilterPattern: "\"StatusCode: 5\""
      MetricTransformations:
        - MetricName: "Api5xxErrorCount"
          MetricNamespace: !Sub "PeriodIQ/${Environment}"
          MetricValue: "1"
          DefaultValue: 0

  ApiClientErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ApiLogGroup
      FilterPattern: "\"StatusCode: 4\""
      MetricTransformations:
        - MetricName: "Api4xxErrorCount"
          MetricNamespace: !Sub "PeriodIQ/${Environment}"
          MetricValue: "1"
          DefaultValue: 0

  Api5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "periodiq-api-5xx-errors-${Environment}"
      AlarmDescription: "CANH BAO: API tra ve qua nhieu loi 5xx (>= 5 loi trong 5 phut)"
      Namespace: !Sub "PeriodIQ/${Environment}"
      MetricName: "Api5xxErrorCount"
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertSnsTopic

  ApiLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "periodiq-api-high-latency-${Environment}"
      AlarmDescription: "CANH BAO: API response time qua cao (> 10 giay trung binh trong 5 phut)"
      Namespace: "AWS/Lambda"
      MetricName: "Duration"
      Dimensions:
        - Name: FunctionName
          Value: !Ref PeriodIQApiFunction
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10000
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertSnsTopic

  ApiInvocationErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "periodiq-api-invocation-errors-${Environment}"
      AlarmDescription: "CANH BAO: Lambda bi loi khi thuc thi (crash, out of memory, timeout)"
      Namespace: "AWS/Lambda"
      MetricName: "Errors"
      Dimensions:
        - Name: FunctionName
          Value: !Ref PeriodIQApiFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertSnsTopic

