  DlqMessageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "periodiq-dlq-messages-${Environment}"
      AlarmDescription: "CANH BAO: Co message bi loi trong Dead Letter Queue (can kiem tra)"
      Namespace: "AWS/SQS"
      MetricName: "ApproximateNumberOfMessagesVisible"
      Dimensions:
        - Name: QueueName
          Value: !GetAtt WorkoutProcessingDLQ.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertSnsTopic

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${PeriodIQHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"

  CloudFrontDomainName:
    Description: "CloudFront distribution domain (URL truy cap chinh cua frontend)"
    Value: !GetAtt PeriodIQDistribution.DomainName

  FrontendBucketName:
    Description: "S3 Bucket name cho Frontend"
    Value: !Ref FrontendBucket

  CognitoUserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref PeriodIQUserPool

  CognitoUserPoolClientId:
    Description: "Cognito User Pool Client ID (dung cho frontend SPA)"
    Value: !Ref PeriodIQUserPoolClient

  WafWebAclArn:
    Description: "WAF WebACL ARN gan vao CloudFront"
    Value: !GetAtt PeriodIQWebAcl.Arn

  SqsQueueUrl:
    Description: "SQS Queue URL cho workout processing"
    Value: !Ref WorkoutProcessingQueue

  SnsTopicArn:
    Description: "SNS Topic ARN cho alerts"
    Value: !Ref AlertSnsTopic

  LambdaFunctionName:
    Description: "Lambda API function name"
    Value: !Ref PeriodIQApiFunction

  LambdaFunctionArn:
    Description: "Lambda API function ARN"
    Value: !GetAtt PeriodIQApiFunction.Arn

