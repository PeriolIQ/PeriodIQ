version: 0.2

env:
    variables:
        NODE_OPTIONS: "--max-old-space-size=4096"

phases:
    install:
        runtime-versions:
            nodejs: 20
        commands:
            - echo "=== INSTALL PHASE ==="
            - node --version
            - npm --version
            - echo "Cai dat npm packages..."
            - cd PeriodIQ.Frontend
            - npm ci

    build:
        commands:
            - echo "=== BUILD PHASE ==="
            - cd PeriodIQ.Frontend
            - echo "Chay linter..."
            - npm run lint || true
            - echo "Build production..."
            - npm run build
            - echo "Build THANH CONG!"
            - echo "kiem tra output..."
            - ls -la dist/
            - npm audit --audit-level=high

    post_build:
        commands:
            - echo "=== POST_BUILD PHASE ==="
            - cd PeriodIQ.Frontend
            - aws s3 sync dist/ s3://${FRONTEND_BUCKET_NAME}/ --delete --cache-control "max-age=86400"
            - aws s3 cp dist/index.html s3://${FRONTEND_BUCKET_NAME}/index.html --cache-control "no-cache, no-store, must-revalidate"
            - echo "Upload S3 HOAN TAT!"

artifacts:
    files:
        - "**/*"
    base-directory: PeriodIQ.Frontend/dist

cache:
    paths:
        - PeriodIQ.Frontend/node_modules/**/*
