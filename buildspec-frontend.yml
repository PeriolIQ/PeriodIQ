version: 0.2

env:
    variables:
        NODE_OPTIONS: "--max-old-space-size=4096"
        PNPM_HOME: "/root/.pnpm"
        # Store pnpm's content-addressable store in the source dir so it can be cached
        PNPM_STORE_DIR: "/codebuild/pnpm-store"

phases:
    install:
        runtime-versions:
            nodejs: 20
        commands:
            - echo "=== INSTALL PHASE ==="
            - node --version
            - echo "Bat pnpm qua corepack..."
            - corepack enable
            - corepack prepare pnpm@9 --activate
            - pnpm --version
            - pnpm config set store-dir "$PNPM_STORE_DIR"
            - echo "Cai dat packages bang pnpm..."
            - cd "$CODEBUILD_SRC_DIR/PeriodIQ.Frontend"
            - pnpm install --frozen-lockfile

    build:
        commands:
            - echo "=== BUILD PHASE ==="
            - cd "$CODEBUILD_SRC_DIR/PeriodIQ.Frontend"
            - echo "Chay linter..."
            - pnpm run lint || true
            # Lay config tu stack chinh roi build trong CUNG 1 lenh (export khong giu qua cac lenh CodeBuild).
            # Vite bake bien VITE_* tu moi truong vao bundle luc build.
            # Moi lenh ket thuc bang ';' va 'if' viet 1 dong co '; fi' -> chay dung du CodeBuild
            # co gop cac dong lai (da test local ca 2 truong hop multi-line va bi-gop).
            - |
              echo "=== Lay Cognito config tu stack $STACK_NAME ===" ;
              export VITE_COGNITO_REGION="$AWS_DEFAULT_REGION" ;
              export VITE_AWS_REGION="$AWS_DEFAULT_REGION" ;
              export VITE_COGNITO_USER_POOL_ID=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='CognitoUserPoolId'].OutputValue" --output text) ;
              export VITE_COGNITO_CLIENT_ID=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='CognitoUserPoolClientId'].OutputValue" --output text) ;
              CF_DOMAIN=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDomainName'].OutputValue" --output text) ;
              export VITE_API_URL="https://$CF_DOMAIN" ;
              echo "UserPoolId=$VITE_COGNITO_USER_POOL_ID ClientId=$VITE_COGNITO_CLIENT_ID ApiUrl=$VITE_API_URL" ;
              if [ -z "$VITE_COGNITO_USER_POOL_ID" ] || [ -z "$VITE_COGNITO_CLIENT_ID" ] || [ -z "$CF_DOMAIN" ]; then echo "LOI: thieu Cognito/CloudFront config -> dung build (tranh deploy bundle rong)"; exit 1; fi ;
              cd "$CODEBUILD_SRC_DIR/PeriodIQ.Frontend" ;
              echo "Build production..." ;
              pnpm run build
            - echo "Build THANH CONG!"
            - echo "kiem tra output..."
            - ls -la dist/
            - pnpm audit --audit-level high || true

    post_build:
        commands:
            - echo "=== POST_BUILD PHASE ==="
            - cd "$CODEBUILD_SRC_DIR/PeriodIQ.Frontend"
            - aws s3 sync dist/ s3://${FRONTEND_BUCKET_NAME}/ --delete --cache-control "max-age=86400"
            - aws s3 cp dist/index.html s3://${FRONTEND_BUCKET_NAME}/index.html --cache-control "no-cache, no-store, must-revalidate"
            - echo "Upload S3 HOAN TAT!"

artifacts:
    files:
        - "**/*"
    base-directory: PeriodIQ.Frontend/dist

cache:
    paths:
        - /codebuild/pnpm-store/**/*
        - PeriodIQ.Frontend/node_modules/**/*
