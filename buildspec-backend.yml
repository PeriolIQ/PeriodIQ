version: 0.2

env:
    variables:
        DOTNET_ROOT: /root/.dotnet
        DOTNET_CLI_TELEMETRY_OPTOUT: "1"
        DOTNET_NOLOGO: "1"

phases:
    install:
        commands:
            - echo "=== INSTALL PHASE ==="
            - echo "Cai dat .NET 10 SDK..."
            - curl -sSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
            - chmod +x /tmp/dotnet-install.sh
            - /tmp/dotnet-install.sh --channel 10.0 --install-dir /root/.dotnet
            - export PATH="/root/.dotnet:$PATH"
            - echo "Kiem tra .NET SDK version..."
            - dotnet --version
            - echo "Kiem tra thu muc project..."
            - ls -la PeriodIQ.Backend/

    pre_build:
        commands:
            - echo "=== PRE_BUILD PHASE ==="
            - echo "Restore NuGet package..."
            - dotnet restore PeriodIQ.Backend/PeriodIQ.sln
            - echo "Restore thanh cong!"
            - dotnet list PeriodIQ.Backend/PeriodIQ.sln package --vulnerable --include-transitive

    build:
        commands:
            - echo "BUILD PHASE"
            - echo "Build solution..."
            - SHORT_SHA=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
            - 'echo "Version: build-${CODEBUILD_BUILD_NUMBER}-${SHORT_SHA}"'
            - dotnet build PeriodIQ.Backend/PeriodIQ.sln --configuration Release --no-restore
            - echo "Chay unit tests..."
            - dotnet test PeriodIQ.Backend/PeriodIQ.sln --configuration Release --no-build --logger trx --results-directory ./test-results --collect "XPlat Code Coverage"
            - echo "Publish API project..."
            - dotnet publish PeriodIQ.Backend/PeriodIQ.Api/PeriodIQ.Api.csproj --configuration Release --output ./publish --self-contained true --runtime linux-x64
            - echo "Build THANH CONG!"

    post_build:
        commands:
            - echo "=== POST_BUILD PHASE ==="
            - echo "Dong goi artifacts..."
            - ls -la ./publish/
            - echo "Post-build HOAN TAT!"

artifacts:
    files:
        - "**/*"
    base-directory: publish
    discard-paths: no

cache:
    paths:
        - /root/.nuget/packages/**/*

reports:
    periodiq-test-report:
        files:
            - "**/*.trx"
        base-directory: test-results
        file-format: VisualStudioTrx
